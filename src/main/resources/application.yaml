server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC
    username: root
    password: "001020"
  redis:
    host: localhost
    port: 6379
    password: "001020"
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug
ai:
  mcp:
    base-url: https://mcp.amap.com/mcp
    api-key: ${AMAP_MCP_KEY:}
    timeout-ms: 15000
    tools:
      poi-keyword: keyword_search
      weather-city: weather_city
      distance: distance
  llm:
    api-base: https://api.deepseek.com/v1
    api-key: ${DEEPSEEK_API_KEY:}
    model: deepseek-coder
    timeout-ms: 20000
